name: gmp_airdrop
description: Cross-platform GMP Airdrop app for iOS, Android, and Windows file transfer.
publish_to: "none"
version: 0.3.11+23

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.1.7
  mime: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.5
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.1
  
  network_info_plus: ^6.1.1

  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/gmp_app_icon.png"
  remove_alpha_ios: true
