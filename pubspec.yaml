name: gmp_airdrop
description: Cross-platform GMP Airdrop app for iOS, Android, and Windows file transfer.
publish_to: "none"
version: 0.3.1-rc1+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.1.7
  mime: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
